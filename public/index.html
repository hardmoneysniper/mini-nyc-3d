<!DOCTYPE html>
<html lang="en" style="overscroll-behavior: none;">
<head>
	<meta charset="utf-8" />
	<link rel="stylesheet" href="mini-nyc-3d.min.css" />
	<title>Mini NYC 3D</title>
	<meta name="description" content="A real-time 3D digital map of New York City's public transport system." />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta property="og:title" content="Mini NYC 3D" />
	<meta property="og:description" content="A real-time 3D digital map of New York City's public transport system." />
	<meta property="og:locale" content="en_US" />
	<meta property="og:site_name" content="Mini NYC 3D" />
	<meta name="twitter:card" content="summary_large_image" />
	<script src="mini-nyc-3d.min.js"></script>
</head>
<body style="width: 100%; height: 100%; margin: 0; padding: 0; position: absolute;">
	<div id="map" style="width: 100%; height: 100%;"></div>
	<script>
		const matchLang = location.search.match(/lang=(.*?)(?:&|$)/),
			matchSelection = location.search.match(/selection=(.*?)(?:&|$)/),
			matchHash = location.hash.match(/[^\d\.\-]*([\d\.\-]*)\/?([\d\.\-]*)\/?([\d\.\-]*)\/?([\d\.\-]*)\/?([\d\.\-]*)/),
			options = {
				container: 'map',
				accessToken: '__MAPBOX_TOKEN__'
			};

		if (matchLang) {
			options.lang = decodeURIComponent(matchLang[1]);
		}
		if (matchSelection) {
			options.selection = decodeURIComponent(matchSelection[1]);
		}
		if (matchHash[1]) {
			options.zoom = +matchHash[1];
		}
		if (matchHash[2] && matchHash[3]) {
			options.center = [+matchHash[3], +matchHash[2]];
		}
		if (matchHash[4]) {
			options.bearing = +matchHash[4];
		}
		if (matchHash[5]) {
			options.pitch = +matchHash[5];
		}

		const map = new mt3d.Map(options);
	</script>
</body>
</html>
